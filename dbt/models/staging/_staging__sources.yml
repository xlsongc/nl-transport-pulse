version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: raw_nl_transport
    tables:
      - name: ns_disruptions
        description: "Source-native raw NS disruption events from v3 API"
        loaded_at_field: _PARTITIONTIME
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: id
            description: "NS disruption ID"
            tests:
              - not_null
          - name: _service_date
            description: "Injected at ingestion: pipeline service date"
            tests:
              - not_null

      - name: ns_departures
        description: "Source-native raw NS departure records from v2 API"
        loaded_at_field: _PARTITIONTIME
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: _service_date
            description: "Injected at ingestion: pipeline service date"
            tests:
              - not_null
          - name: _station_code
            description: "Injected at ingestion: station queried"
            tests:
              - not_null

      - name: rdt_services
        description: "Historical train stop records from rijdendetreinen.nl (monthly CSV)"
        columns:
          - name: service_date
            description: "Date of the train service"
            tests:
              - not_null
          - name: station_code
            description: "Station code for this stop"
            tests:
              - not_null

      - name: rdt_disruptions
        description: "Historical disruption records from rijdendetreinen.nl (yearly CSV)"
        columns:
          - name: rdt_id
            description: "Unique disruption identifier"
            tests:
              - not_null
          - name: start_time
            description: "Disruption start timestamp"
            tests:
              - not_null

      - name: ndw_traffic_flow
        description: "Raw NDW 15-minute traffic observations"
        loaded_at_field: _PARTITIONTIME
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: location_id
            tests:
              - not_null
          - name: service_date
            tests:
              - not_null

      - name: knmi_weather
        description: "Daily weather observations from KNMI for corridor stations"
        columns:
          - name: service_date
            description: "Date of the weather observation"
            tests:
              - not_null
          - name: station_code
            description: "KNMI weather station code"
            tests:
              - not_null
