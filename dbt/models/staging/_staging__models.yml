version: 2

models:
  - name: stg_ns_disruptions
    description: "Staged NS disruption events — extracted from source-native raw JSON"
    columns:
      - name: disruption_id
        description: "Unique disruption identifier from NS API"
        tests:
          - not_null
      - name: service_date
        description: "Pipeline service date"
        tests:
          - not_null
      - name: disruption_type
        description: "DISRUPTION or MAINTENANCE"
      - name: impact_score
        description: "NS impact severity (1-5)"
      - name: cause
        description: "First cause label from timespans"

  - name: stg_ns_departures
    description: "Staged NS departures — extracted from source-native raw JSON with computed delay"
    columns:
      - name: departure_id
        description: "Composite key: station_code + service_date + planned_ts + direction"
        tests:
          - not_null
          - unique
      - name: delay_minutes
        description: "Delay in minutes (actual - planned). Null if timestamps missing."
      - name: is_cancelled
        description: "Whether the departure was cancelled"
      - name: data_source
        description: "Origin: ns_api_v2 (live) or rdt_archive (historical)"

  - name: stg_rdt_services
    description: "Staged historical train stop records from rijdendetreinen.nl archive"
    columns:
      - name: departure_id
        description: "stop_rdt_id — unique per stop record"
        tests:
          - not_null
      - name: service_date
        description: "Date of the train service"
        tests:
          - not_null
      - name: station_code
        description: "Station code for this stop"
        tests:
          - not_null

  - name: stg_rdt_disruptions
    description: "Staged historical disruption records from rijdendetreinen.nl archive"
    columns:
      - name: disruption_id
        description: "rdt_id — unique disruption identifier"
        tests:
          - not_null
      - name: service_date
        description: "Date derived from disruption start_time"
        tests:
          - not_null
      - name: cause
        description: "Cause in English"
      - name: cause_group
        description: "Categorized cause group (e.g., accidents, weather, infra)"

  - name: stg_ndw_traffic_flow
    description: "Cleaned NDW 15-minute traffic observations"
    columns:
      - name: location_id
        description: "NDW measurement point identifier"
        tests:
          - not_null
      - name: measurement_ts
        description: "Start of the 15-minute measurement interval"
        tests:
          - not_null
