version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY:-}
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
    - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/keys/gcp-credentials.json
    - GCP_PROJECT_ID=${GCP_PROJECT_ID}
    - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
    - BQ_RAW_DATASET=${BQ_RAW_DATASET}
    - BQ_STAGING_DATASET=${BQ_STAGING_DATASET}
    - BQ_CORE_DATASET=${BQ_CORE_DATASET}
    - NS_API_KEY=${NS_API_KEY}
    - NS_API_BASE_URL=${NS_API_BASE_URL:-https://gateway.apiportal.ns.nl}
    - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./keys:/opt/airflow/keys:ro
    - ./logs:/opt/airflow/logs
    - ../dbt:/opt/airflow/dbt
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db init &&
      airflow users create
        --username airflow
        --password airflow
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: always

  streamlit:
    build:
      context: ../streamlit
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/keys/gcp-credentials.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - BQ_CORE_DATASET=${BQ_CORE_DATASET}
    volumes:
      - ../streamlit:/app
      - ./keys:/app/keys:ro
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    restart: always

volumes:
  postgres-data:
